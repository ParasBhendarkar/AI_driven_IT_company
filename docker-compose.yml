  #   env_file:
  #     - ./backend/.env
  #   environment:
  #     - POSTGRES_HOST=postgres
  #     - REDIS_HOST=redis
  #     - QDRANT_HOST=qdrant
  #     - OLLAMA_HOST=ollama
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #   command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  #   networks:
  #     - conductor-network

  # worker:
  #   build:
  #     context: ./backend
